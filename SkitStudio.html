function fart(t=0){const c=ac(),o=c.createOscillator(),g=c.createGain(),l=c.createOscillator(),lg=c.createGain();l.frequency.value=13;lg.gain.value=30;l.connect(lg);lg.connect(o.frequency);o.type="sawtooth";o.frequency.setValueAtTime(88,c.currentTime+t);o.frequency.exponentialRampToValueAtTime(38,c.currentTime+t+0.6);g.gain.setValueAtTime(0.45,c.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.7);o.connect(g);g.connect(c.destination);l.start(c.currentTime+t);o.start(c.currentTime+t);l.stop(c.currentTime+t+0.7);o.stop(c.currentTime+t+0.7);}
function bark(t=0){const c=ac(),o=c.createOscillator(),g=c.createGain();o.type="square";o.frequency.setValueAtTime(470,c.currentTime+t);o.frequency.exponentialRampToValueAtTime(195,c.currentTime+t+0.2);g.gain.setValueAtTime(0,c.currentTime+t);g.gain.linearRampToValueAtTime(0.28,c.currentTime+t+0.01);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.24);o.connect(g);g.connect(c.destination);o.start(c.currentTime+t);o.stop(c.currentTime+t+0.28);}
function thump(t=0){const c=ac(),o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.setValueAtTime(145,c.currentTime+t);o.frequency.exponentialRampToValueAtTime(26,c.currentTime+t+0.15);g.gain.setValueAtTime(0.6,c.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.18);o.connect(g);g.connect(c.destination);o.start(c.currentTime+t);o.stop(c.currentTime+t+0.22);}

function buildTar(files){
  const enc=new TextEncoder();
  function mkHeader(name,size){
    const h=new Uint8Array(512);
    function wrt(off,str,max){const b=enc.encode(str.slice(0,max));h.set(b,off);}
    wrt(0,name,100);wrt(100,"0000644\0",8);wrt(108,"0000000\0",8);wrt(116,"0000000\0",8);
    wrt(124,size.toString(8).padStart(11,"0")+"\0",12);
    wrt(136,Math.floor(Date.now()/1000).toString(8).padStart(11,"0")+"\0",12);
    h.fill(0x20,148,156);h[156]=0x30;wrt(257,"ustar ",6);wrt(263," \0",2);
    let sum=0;for(let i=0;i<512;i++)sum+=h[i];wrt(148,sum.toString(8).padStart(6,"0")+"\0 ",8);return h;
  }
  const blocks=[];
  for(const f of files){
    const data=typeof f.content==="string"?enc.encode(f.content):f.content;
    blocks.push(mkHeader(f.name,data.length));
    const pad=new Uint8Array(Math.ceil(data.length/512)*512);pad.set(data);blocks.push(pad);
  }
  blocks.push(new Uint8Array(1024));
  const total=blocks.reduce((s,b)=>s+b.length,0);
  const out2=new Uint8Array(total);let off=0;
  for(const b of blocks){out2.set(b,off);off+=b.length;}return out2;
}
function downloadTar(files,filename){
  const blob=new Blob([buildTar(files)],{type:"application/x-tar"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

    +'  "effects_after":["gas_off"]\n'

// DurationInput: local draft string so user can freely retype without snapping
function DurationInput({duration,onCommit}){
  const [draft,setDraft]=React.useState(String(duration));
  // Keep draft in sync if duration changes externally (e.g. beat type switch)
  React.useEffect(()=>{setDraft(String(duration));},[duration]);
  function handleChange(e){
    const val=e.target.value;
    setDraft(val);
    // Commit immediately on every valid keystroke so state is always current
    // (blur-only commit causes race: clicking Play before blur -> stale lines)
    const ms=parseInt(val,10);
    if(!isNaN(ms)&&ms>=50)onCommit(ms);
  }
  // On blur, revert display to last committed value if field left invalid
  function handleBlur(){
    const ms=parseInt(draft,10);
    if(isNaN(ms)||ms<50)setDraft(String(duration));
  }
  function handleKey(e){if(e.key==="Enter")e.target.blur();}
  return(
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <span style={{fontSize:10,color:"#556",flexShrink:0}}>⏱ duration:</span>
      <input type="number" min="50" step="100" value={draft}
        onChange={handleChange} onBlur={handleBlur} onKeyDown={handleKey}
        style={{width:80,background:"#080C16",color:"#8ABACC",border:"1.5px solid #2A3A50",borderRadius:5,padding:"3px 6px",fontSize:11,fontFamily:"monospace",outline:"none"}}/>
      <span style={{fontSize:10,color:"#334"}}>ms</span>
    </div>
  );
}

function LineCard({line,index,origText,recordings,recording,recTime,startRec,stopRec,clearRec,onPreview,onTextChange,onReset,isFirst,isLast,onDelete,onMoveUp,onMoveDown,onTypeChange}){
  const [editing,setEditing]=useState(false);const [draft,setDraft]=useState(line.text);const taRef=useRef(null);
  const isRec=recording===line.id,hasRec=!!recordings[line.id],isEdited=line.text!==origText;
  function openEdit(){if(isRec)return;setDraft(line.text);setEditing(true);setTimeout(()=>taRef.current?.focus(),40);}

  return(
    <div style={{background:hasRec?"#0A1A0A":"#16182A",border:"2px solid "+(isRec?"#FF4444":editing?"#FFE900":hasRec?"#2ECC71":"#2A2D44"),borderRadius:10,padding:"10px 12px",animation:isRec?"recPulse 1s ease-in-out infinite":"none"}}>

            <button className="btn" disabled={isFirst} onClick={()=>onMoveUp(line.id)}
              style={{padding:"1px 6px",fontSize:10,background:"#0A0E1A",color:isFirst?"#222":"#8ABACC",border:"1px solid #2A2D44",opacity:isFirst?0.35:1}}>▲</button>
            <button className="btn" disabled={isLast} onClick={()=>onMoveDown(line.id)}

              <textarea ref={taRef} value={draft} rows={3} onChange={e=>setDraft(e.target.value)}

                style={{width:"100%",boxSizing:"border-box",background:"#080C16",color:"#FFE900",border:"2px solid #FFE900",borderRadius:6,padding:"6px 8px",fontSize:12,fontFamily:"'Comic Sans MS',cursive",lineHeight:1.5,resize:"vertical",outline:"none"}}/>
              <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap"}}>
                <button className="btn" onClick={saveEdit} style={{padding:"4px 12px",fontSize:11,background:"#FFE900",color:"#1A1A00",border:"2px solid #AA9900",boxShadow:"2px 2px 0 #000"}}>&#10003; Save</button>
                <button className="btn" onClick={()=>setEditing(false)} style={{padding:"4px 10px",fontSize:11,background:"#2A2A3A",color:"#AAA",border:"2px solid #444"}}>&#10005; Cancel</button>
                {isEdited&&<button className="btn" onClick={()=>{onReset(line.id);setEditing(false);}} style={{padding:"4px 10px",fontSize:11,background:"#1A0A00",color:"#FF9944",border:"2px solid #442200"}}>&#8634; Original</button>}
              </div>
            </div>
          ):(
            <div onClick={openEdit} title={isRec?"":"Click to edit"}
              style={{color:"#C8CAD8",fontSize:12,fontStyle:"italic",background:"rgba(255,255,255,0.04)",borderRadius:6,padding:"5px 28px 5px 8px",lineHeight:1.5,cursor:isRec?"default":"text",border:"1px dashed transparent",position:"relative"}}

            </div>

        </div>
      </div>

          {!isRec?(
            <button className="btn" onClick={()=>startRec(line.id)} disabled={!!recording&&!isRec}
              style={{padding:"6px 14px",fontSize:12,background:hasRec?"#0A2A0A":"#550000",color:(!!recording&&!isRec)?"#444":"white",border:"2px solid "+(hasRec?"#2ECC71":"#CC0000"),boxShadow:"2px 2px 0 #000"}}>

          {isRec&&<div style={{display:"flex",gap:3,alignItems:"center"}}>{[0,1,2,3,4].map(i=><div key={i} style={{width:3,background:"#FF4444",borderRadius:2,animation:"vu "+(0.3+i*0.1)+"s ease-in-out infinite alternate",animationDelay:(i*0.07)+"s"}}/>)}<span style={{color:"#FF4444",fontSize:10,marginLeft:4}}>RECORDING...</span></div>}
        </div>
      )}
    </div>
  );
}

function App(){

  const [compiledChars,setCompiledChars]=useState(()=>{const c={};Object.entries(DEFAULT_SKIT.characters||{}).forEach(([id,ch])=>{if(!ch.svg_component)return;try{const code=Babel.transform("("+ch.svg_component+")",{presets:["react"]}).code;c[id]=eval(code);}catch(e){}});return c;});
  const [charModes,setCharModes]=useState(()=>{const m={};Object.entries(DEFAULT_SKIT.characters||{}).forEach(([id,ch])=>{m[id]=ch.initial_mode||"idle";});return m;});
  const [charStates,setCharStates]=useState(()=>{const s={};Object.entries(DEFAULT_SKIT.characters||{}).forEach(([id,ch])=>{s[id]=ch.initial_state||null;});return s;});
  const [charParams,setCharParams]=useState({});
  const [charVisible,setCharVisible]=useState({});
  const [charZOrder,setCharZOrder]=useState([]);
  const [bubble,setBubble]=useState(null);
  const [gas,setGas]=useState(false);const [sfx,setSFX]=useState(null);
  const [playing,setPlaying]=useState(false);const [phase,setPhase]=useState("idle");
  const [showNewModal,setShowNewModal]=useState(false);
  const [hasSession,setHasSession]=useState(false);
  const [libVersion,setLibVersion]=useState(0);

  useEffect(()=>{try{setHasSession(!!localStorage.getItem(LS_LAST_SKIT));}catch(e){};},[]);
  // Auto-zoom: scale the whole UI to fit whatever viewport the user has
  useEffect(()=>{
    const DESIGN_WIDTH=1280;

    function applyZoom(){
      const ratio=Math.min(MAX_ZOOM,Math.max(MIN_ZOOM,window.innerWidth/DESIGN_WIDTH));
      document.documentElement.style.zoom=String(ratio);
    }
    applyZoom();
    window.addEventListener("resize",applyZoom);
    return()=>{
      window.removeEventListener("resize",applyZoom);
      document.documentElement.style.zoom="";
    };
  },[]);
  const cancelRef=useRef(false);const appViewRef=useRef("welcome");
  const [bgComp,setBgComp]=useState(null);
  const bgSrcRef=useRef("");
  useEffect(()=>{appViewRef.current=appView;},[appView]);
  function compileAndInitChars(chars){
    skitCharsRef.current=chars||{};
    const comp={};
    Object.entries(chars||{}).forEach(([id,ch])=>{if(!ch.svg_component)return;try{const code=Babel.transform("("+ch.svg_component+")",{presets:["react"]}).code;comp[id]=eval(code);}catch(e){console.warn("SVG compile:",id,e);}});
    setCompiledChars(comp);

    Object.entries(chars||{}).forEach(([id,ch])=>{m[id]=ch.initial_mode||"idle";s[id]=ch.initial_state||null;});

    const b={...DEFAULT_BPOS};Object.entries(chars||{}).forEach(([id,ch])=>{if(ch.bpos)b[id]=ch.bpos;});bposRef.current=b;
  }

  const autoSaveTimer=useRef(null);
  function scheduleAutoSave(){
    if(appViewRef.current!=="studio")return;
    clearTimeout(autoSaveTimer.current);
    autoSaveTimer.current=setTimeout(()=>{
      try{localStorage.setItem(LS_LAST_SKIT,serializeSkit(skitTitle,skitEpisode,skitCharsRef.current,linesRef.current,audioB64.current,bgSrcRef.current));setSaveStatus("saved");setTimeout(()=>setSaveStatus("idle"),2000);}
      catch(e){setSaveStatus("error");}

  }
  useEffect(()=>{linesRef.current=lines;scheduleAutoSave();},[lines,skitTitle,skitEpisode]);
  // Keep bposRef in sync whenever skitChars changes (covers Beat Builder char additions)
  useEffect(()=>{
    const b={...DEFAULT_BPOS};
    Object.entries(skitChars).forEach(([id,ch])=>{if(ch.bpos)b[id]=ch.bpos;});
    bposRef.current=b;
  },[skitChars]);
  function showToast(msg,color="#FFE900"){setToast({msg,color});setTimeout(()=>setToast(null),3000);}
  function applyLoadedSkit(d){
    Object.values(recordings).forEach(u=>URL.revokeObjectURL(u));
    setSkitTitle(d.title);setSkitEpisode(d.episode);
    setLines(d.lines);origLines.current=d.lines.map(l=>({...l}));linesRef.current=d.lines;
    const urls={},b64s={};
    Object.entries(d.audio).forEach(([id,b64])=>{const u=b64ToUrl(b64);if(u){urls[id]=u;b64s[id]=b64;}});
    audioB64.current=b64s;setRecordings(urls);
    let _lib={};try{_lib=JSON.parse(localStorage.getItem(LS_CHAR_LIB)||"{}");}catch(e){}
    const _merged={...d.characters||{}};
    Object.keys(_merged).forEach(id=>{if(_lib[id])_merged[id]=_lib[id];});
    setSkitChars(_merged);compileAndInitChars(_merged);
    if(d.bg_src){try{const code=Babel.transform("("+d.bg_src+")",{presets:["react"]}).code;setBgComp(()=>eval(code));bgSrcRef.current=d.bg_src;}catch(e){console.warn("bg restore fail",e);}}
    else{setBgComp(null);bgSrcRef.current="";applyDefaultBG();}
  }
  function openFilePicker(cb){
    const inp=document.createElement("input");inp.type="file";inp.accept=".skit,.json";
    inp.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{applyLoadedSkit(parseSkit(ev.target.result));resetScene();showToast("📂 Loaded!","#2ECC71");if(cb)cb();}catch(err){alert("Could not load skit.\n"+err.message);}};reader.readAsText(file);};inp.click();
  }
  function handleLoadFromWelcome(){openFilePicker(()=>{setTab("studio");setAppView("studio");});}
  function handleResume(){
    try{
      const s=localStorage.getItem(LS_LAST_SKIT);if(!s)return;
      applyLoadedSkit(parseSkit(s));setTab("studio");setAppView("studio");showToast("↩ Session restored","#2ECC71");
    }catch(e){alert("Could not restore session.\n"+e.message);}
  }
  function loadSkit(){openFilePicker(()=>setPhase("idle"));}
  function loadBG(){
    const inp=document.createElement("input");inp.type="file";inp.accept=".bg,.json";
    inp.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d._type!=="fyeox_background")throw new Error("Not a .bg file");const code=Babel.transform("("+d.svg_component+")",{presets:["react"]}).code;const Comp=eval(code);setBgComp(()=>Comp);bgSrcRef.current=d.svg_component;showToast("\uD83D\uDDBC\uFE0F "+(d.name||d.id)+" loaded!","#8ABACC");}catch(err){alert("Could not load background.\n"+err.message);}};reader.readAsText(file);};
    inp.click();
  }
  // Loads the default background from localStorage (installed by the Starter Pack).
  // Silent no-op if nothing is stored — the studio still works without it.
  function applyDefaultBG(){
    try{
      const d=JSON.parse(localStorage.getItem(LS_BG_DEFAULT)||"null");
      if(!d?.svg_component)return;
      const code=Babel.transform("("+d.svg_component+")",{presets:["react"]}).code;
      const Comp=eval(code);
      setBgComp(()=>Comp);
      bgSrcRef.current=d.svg_component;
    }catch(e){console.warn("FYEOX: default bg load failed",e);}
  }
  function confirmNewSkit(){
    setShowNewModal(false);
    Object.values(recordings).forEach(u=>URL.revokeObjectURL(u));
    setSkitChars({});compileAndInitChars({});
    setSkitTitle("New Skit");setSkitEpisode(1);
    setLines([]);linesRef.current=[];origLines.current=[];audioB64.current={};setRecordings({});
    setBgComp(null);bgSrcRef.current="";applyDefaultBG();
    resetScene();showToast("✨ New skit started","#8ABACC");
  }
  function saveSkit(){
    downloadFile(serializeSkit(skitTitle,skitEpisode,skitCharsRef.current,lines,audioB64.current,bgSrcRef.current),
      skitTitle.replace(/[^a-z0-9]/gi,"_").toLowerCase()+"_ep"+skitEpisode+".skit","application/json");
    showToast("💾 Skit saved!","#2ECC71");
  }
  function exportViewer(){
    const rc=lines.filter(l=>l.recordable&&recordings[l.id]).length;
    const total=lines.filter(l=>l.recordable).length;
    if(rc===0&&total>0&&!window.confirm("No lines recorded yet — viewer will use robot voice (TTS). Export anyway?")){return;}
    downloadFile(buildViewerHTML(skitTitle,skitCharsRef.current,lines,audioB64.current,bgSrcRef.current),
      skitTitle.replace(/[^a-z0-9]/gi,"_").toLowerCase()+"_ep"+skitEpisode+"_viewer.html","text/html");
    showToast("🎬 Viewer exported!","#2ECC71");
  }
  function resetScene(){
    cancelRef.current=true;if(previewRef.current)previewRef.current.pause();if(window.speechSynthesis)window.speechSynthesis.cancel();
    const m={},s={};Object.entries(skitCharsRef.current||{}).forEach(([id,ch])=>{m[id]=ch.initial_mode||"idle";s[id]=ch.initial_state||null;});setCharModes(m);setCharStates(s);
    setBubble(null);setGas(false);setSFX(null);setPlaying(false);setPhase("idle");setCharParams({});setCharVisible({});setCharZOrder([]);
  }
  async function playSkit(){
    if(playing)return;cancelRef.current=false;setPlaying(true);setPhase("playing");
    const im={},is={};Object.entries(skitCharsRef.current||{}).forEach(([id,ch])=>{im[id]=ch.initial_mode||"idle";is[id]=ch.initial_state||null;});setCharModes(im);setCharStates(is);setBubble(null);setGas(false);setSFX(null);
    const ok=()=>!cancelRef.current;
    for (const beat of linesRef.current) {
      if(!ok())break;
      if(beat.pre_delay){await wait(beat.pre_delay);if(!ok())break;}
      for(const eff of (beat.effects_before||[])){if(!ok())break;if(eff==="gas_on")setGas(true);else if(eff.startsWith("sfx:"))setSFX(eff.slice(4));else if(eff==="sound:fart")fart();else if(eff==="sound:bark")bark();else if(eff==="sound:thump")thump();}
      if(beat.char&&beat.mode){
        setCharModes(m=>({...m,[beat.char]:beat.mode}));
        setCharVisible(v=>({...v,[beat.char]:true}));
        setCharZOrder(z=>beat.params?.bring_to_front?[...z.filter(id=>id!==beat.char),beat.char]:z.includes(beat.char)?z:[...z,beat.char]);
      }
      if(beat.char&&beat.params!==undefined)setCharParams(p=>({...p,[beat.char]:{...(p[beat.char]||{}),...(beat.params||{})}}));
      if(beat.char&&beat.char_state!==undefined)setCharStates(s=>({...s,[beat.char]:beat.char_state}));
      if(beat.sfx_text)setSFX(beat.sfx_text);
      for(const[i,s]of(beat.sounds||[]).entries()){const t=i*0.3;if(s==="bark")bark(t);else if(s==="thump")thump(t);else if(s==="fart")fart(t);}
      if(beat.bubble&&beat.text){
        const bp=bposRef.current[beat.char]||skitCharsRef.current[beat.char]?.bpos||{cx:270,cy:160,tailDir:"down-left"};
        if(ok())setBubble({who:beat.char,text:beat.text,type:beat.bubble,cx:bp.cx,cy:bp.cy,tailDir:bp.tailDir});
        if(recordings[beat.id])await playAudio(recordings[beat.id]);
        else if(beat.tts)await speakFallback(beat.text,beat.tts);
        else if(beat.duration)await wait(beat.duration);
      }else if(beat.duration){await wait(beat.duration);}
      if(!ok())break;
      setBubble(null);setSFX(null);
      if(beat.char&&beat.mode&&beat.recordable)setCharModes(m=>({...m,[beat.char]:skitCharsRef.current[beat.char]?.initial_mode||"idle"}));
      for(const eff of (beat.effects_after||[])){if(!ok())break;if(eff==="gas_off")setGas(false);}
      if(beat.post_delay){await wait(beat.post_delay);if(!ok())break;}
    }
    if(ok()){setPlaying(false);setPhase("done");}
  }
  async function startRec(lineId){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      chunksRef.current=[];const mr=new MediaRecorder(stream);
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=async()=>{
        const blob=new Blob(chunksRef.current,{type:"audio/webm"});const url=URL.createObjectURL(blob);
        setRecordings(r=>({...r,[lineId]:url}));stream.getTracks().forEach(t=>t.stop());
        try{setSaveStatus("saving");const b64=await blobToB64(blob);audioB64.current[lineId]=b64;scheduleAutoSave();}catch(e){setSaveStatus("error");}
      };
      mr.start();mediaRef.current=mr;setRecording(lineId);setRecTime(0);
      timerRef.current=setInterval(()=>setRecTime(t=>t+1),1000);
    }catch(e){alert("Microphone access required.");}
  }
  function stopRec(){if(mediaRef.current&&mediaRef.current.state!=="inactive")mediaRef.current.stop();clearInterval(timerRef.current);setRecording(null);setRecTime(0);}
  function clearRec(id){if(recordings[id])URL.revokeObjectURL(recordings[id]);setRecordings(r=>{const n={...r};delete n[id];return n;});delete audioB64.current[id];scheduleAutoSave();}
  function previewLine(url){if(previewRef.current)previewRef.current.pause();const a=new Audio(url);previewRef.current=a;a.play();}
  function changeLineText(id,text){setLines(prev=>{const n=prev.map(l=>l.id===id?{...l,text}:l);linesRef.current=n;return n;});}
  function resetLineText(id){const d=origLines.current.find(x=>x.id===id);if(d)changeLineText(id,d.text);}
  function changeLineMode(id,mode){
    setLines(prev=>{
      const idx=prev.findIndex(l=>l.id===id);
      if(idx<0)return prev;
      const l=prev[idx];
      let next;
      if(l._new){
        const newId=genBeatId(l.char,mode,idx);
        next=[...prev];
        next[idx]={...l,id:newId,mode};
      }else{
        next=prev.map(l2=>l2.id===id?{...l2,mode}:l2);
      }
      linesRef.current=next;
      return next;
    });
  }
  function changeLineParams(id,params){setLines(prev=>{const n=prev.map(l=>l.id===id?{...l,params}:l);linesRef.current=n;return n;});}
  // ── v0.5.0 Beat Builder ──────────────────────────────────────────────────
  function addBeat(){
    setLines(prev=>{
      const idx=prev.length;
      const b=makeBeat(idx);
      origLines.current=[...origLines.current,{...b}];
      const n=[...prev,b];
      linesRef.current=n;
      return n;
    });
  }
  function deleteBeat(id){
    if(recordings[id])URL.revokeObjectURL(recordings[id]);
    setRecordings(r=>{const n={...r};delete n[id];return n;});
    delete audioB64.current[id];
    origLines.current=origLines.current.filter(l=>l.id!==id);
    setLines(prev=>{const n=prev.filter(l=>l.id!==id);linesRef.current=n;return n;});
  }
  function moveBeat(id,dir){
    setLines(prev=>{
      const i=prev.findIndex(l=>l.id===id);
      if(i<0)return prev;
      const ni=i+dir;
      if(ni<0||ni>=prev.length)return prev;
      const next=[...prev];
      [next[i],next[ni]]=[next[ni],next[i]];
      linesRef.current=next;
      return next;
    });
  }
  function changeBeatChar(id,char){
    // If char is not in the active skit yet, pull it from the library and register it
    if(char&&!skitCharsRef.current[char]){
      try{
        const _lib=JSON.parse(localStorage.getItem(LS_CHAR_LIB)||"{}");
        if(_lib[char]){
          const ch=_lib[char];
          const merged={...skitCharsRef.current,[char]:ch};
          skitCharsRef.current=merged;
          setSkitChars(merged);
          // compile svg if present
          if(ch.svg_component){
            try{const code=Babel.transform("("+ch.svg_component+")",{presets:["react"]}).code;
              setCompiledChars(c=>({...c,[char]:eval(code)}));}catch(e){}
          }
          // register bpos
          if(ch.bpos)bposRef.current={...bposRef.current,[char]:ch.bpos};
          // init mode/state
          setCharModes(m=>({...m,[char]:ch.initial_mode||"idle"}));
          setCharStates(s=>({...s,[char]:ch.initial_state||null}));
        }
      }catch(e){}
    }
    setLines(prev=>{
      const idx=prev.findIndex(l=>l.id===id);
      if(idx<0)return prev;
      const l=prev[idx];
      const modes=skitCharsRef.current[char]?.modes||[];
      const mode=modes.length?modes[0]:"";
      const newId=l._new?genBeatId(char,mode,idx):l.id;
      const next=[...prev];
      next[idx]={...l,id:newId,char,mode};
      linesRef.current=next;
      return next;
    });
  }
  function changeBeatType(id,type){
    setLines(prev=>{
      const target=prev.find(l=>l.id===id);
      if(type==="dialogue"&&!target?.char){
        showToast("Pick a character first!","#FF8844");return prev;
      }
      const n=prev.map(l=>{
        if(l.id!==id)return l;
        if(type==="dialogue")
          return{...l,recordable:true,duration:undefined,
            text:l.text||"",bubble:l.bubble||"speech",tts:l.tts||{pitch:1,rate:1}};
        if(type==="sfx")
          return{...l,recordable:false,char:"",mode:"",
            duration:l.duration||1000,sfx_text:l.sfx_text||""};
        return{...l,recordable:false,duration:l.duration||1000};
      });
      linesRef.current=n;
      return n;
    });
  }
  function changeBeatDuration(id,ms){
    setLines(prev=>{const n=prev.map(l=>l.id===id?{...l,duration:ms}:l);linesRef.current=n;return n;});
  }
  function changeBeatSfxText(id,text){

function buildViewerHTML(title,characters,lines,audioMap,bgSrc){

  }).replace(/</g,"\\u003c").replace(/>/g,"\\u003e").replace(/\//g,"\\u002f");
  return `<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FYEOX \u2014 ${title}<\/title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"><\/script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#0d1520;font-family:'Comic Sans MS',cursive;display:flex;align-items:center;justify-content:center;min-height:100vh;}
@keyframes rockSway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(1.8deg)}}
@keyframes backUp{0%{transform:translateX(0)}100%{transform:translateX(var(--bk-x,80px))}}
@keyframes backUp{0%{transform:translateX(0)}100%{transform:translateX(var(--bk-x,80px))}}
@keyframes caneShake{0%{transform:rotate(0deg)}25%{transform:rotate(-14deg)}75%{transform:rotate(14deg)}100%{transform:rotate(0deg)}}
@keyframes barkShake{0%{transform:translate(0,0)}25%{transform:translate(-5px,-4px) rotate(-5deg)}75%{transform:translate(5px,3px) rotate(5deg)}100%{transform:translate(0,0)}}
@keyframes growlShake{0%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}100%{transform:translateX(0)}}
@keyframes gasPulse{from{opacity:.7;transform:scale(.95)}to{opacity:1;transform:scale(1.05)}}
@keyframes popIn{0%{transform:scale(0) rotate(-12deg);opacity:0}70%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes bubbleFade{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}<\/style>
<\/head><body><div id="r"><\/div>
<script id="bd" type="application/json">${baked}<\/script>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const D=JSON.parse(document.getElementById('bd').textContent);
const LN=D.lines||[],AU=D.audio||{},CHARS=D.characters||{};
const charComps={};
Object.entries(CHARS).forEach(([id,ch])=>{
  if(!ch.svg_component)return;
  try{const code=Babel.transform('('+ch.svg_component+')',{presets:['react']}).code;charComps[id]=eval(code);}
  catch(e){console.warn('charComp fail:',id,e);}
});
const BPOS={};Object.entries(CHARS).forEach(([id,ch])=>{if(ch.bpos)BPOS[id]=ch.bpos;});
let _x=null;const ac=()=>{if(!_x)_x=new(window.AudioContext||window.webkitAudioContext)();return _x;};
const wt=ms=>new Promise(r=>setTimeout(r,ms));
function fa(t=0){const c=ac(),o=c.createOscillator(),g=c.createGain(),l=c.createOscillator(),lg=c.createGain();l.frequency.value=13;lg.gain.value=30;l.connect(lg);lg.connect(o.frequency);o.type="sawtooth";o.frequency.setValueAtTime(88,c.currentTime+t);o.frequency.exponentialRampToValueAtTime(38,c.currentTime+t+0.6);g.gain.setValueAtTime(0.45,c.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.7);o.connect(g);g.connect(c.destination);l.start(c.currentTime+t);o.start(c.currentTime+t);l.stop(c.currentTime+t+0.7);o.stop(c.currentTime+t+0.7);}
function bk(t=0){const c=ac(),o=c.createOscillator(),g=c.createGain();o.type="square";o.frequency.setValueAtTime(470,c.currentTime+t);o.frequency.exponentialRampToValueAtTime(195,c.currentTime+t+0.2);g.gain.setValueAtTime(0,c.currentTime+t);g.gain.linearRampToValueAtTime(0.28,c.currentTime+t+0.01);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.24);o.connect(g);g.connect(c.destination);o.start(c.currentTime+t);o.stop(c.currentTime+t+0.28);}
function th(t=0){const c=ac(),o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.setValueAtTime(145,c.currentTime+t);o.frequency.exponentialRampToValueAtTime(26,c.currentTime+t+0.15);g.gain.setValueAtTime(0.6,c.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.18);o.connect(g);g.connect(c.destination);o.start(c.currentTime+t);o.stop(c.currentTime+t+0.22);}
function pa(url){return new Promise(r=>{if(!url){r();return;}const a=new Audio(url);a.onended=r;a.onerror=r;a.play().catch(r);});}
function sf(text,o={}){return new Promise(r=>{if(!window.speechSynthesis){setTimeout(r,text.length*70);return;}window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.pitch=o.pitch??1;u.rate=o.rate??1;u.onend=r;u.onerror=()=>setTimeout(r,500);setTimeout(()=>window.speechSynthesis.speak(u),60);});}
function b2u(b64){try{const a=b64.split(","),m=a[0].match(/:(.*?);/)[1],b=atob(a[1]),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return URL.createObjectURL(new Blob([u],{type:m}));}catch(e){return null;}}
let _bgComp=null;
if(D.bg_src){try{const _bc=Babel.transform("("+D.bg_src+")",{presets:["react"]}).code;_bgComp=eval(_bc);}catch(e){console.warn("bg fail",e);}}
function GasCloud(){return(<g style={{animation:"gasPulse 0.4s ease-in-out infinite alternate"}}><ellipse cx="385" cy="210" rx="42" ry="26" fill="rgba(100,200,60,0.52)"/><ellipse cx="358" cy="220" rx="27" ry="18" fill="rgba(100,200,60,0.46)"/><\/g>);}
function Bubble({cx,cy,text,type,tailDir}){
  const ls=text.split("\\n"),bw=Math.max(...ls.map(l=>l.length))*7.5+32,bh=ls.length*20+18,bx=cx-bw/2,by=cy-bh/2;
  if(type==="bark"){const pts=[];for(let i=0;i<8;i++){const a1=(i/8)*Math.PI*2,a2=((i+0.5)/8)*Math.PI*2;pts.push((cx+Math.cos(a1)*(bw/2+13))+","+(cy+Math.sin(a1)*(bh/2+11)));pts.push((cx+Math.cos(a2)*(bw/2))+","+(cy+Math.sin(a2)*(bh/2)));}return(<g style={{animation:"popIn .15s ease-out"}}><polygon points={pts.join(" ")} fill="#FFE900" stroke="#000" strokeWidth="3"/><ellipse cx={cx} cy={cy} rx={bw/2} ry={bh/2} fill="#FFE900" stroke="#000" strokeWidth="2.5"/>{ls.map((l,i)=><text key={i} x={cx} y={cy+(i-(ls.length-1)/2)*20+5} textAnchor="middle" fontSize="15" fill="#CC0000" fontFamily="Comic Sans MS" fontWeight="bold">{l}<\/text>)}<\/g>);}
  if(type==="thought"){return(<g style={{animation:"bubbleFade .25s ease-out"}}><ellipse cx={cx} cy={cy} rx={bw/2} ry={bh/2} fill="white" stroke="#AAA" strokeWidth="2" strokeDasharray="5,3"/>{ls.map((l,i)=><text key={i} x={cx} y={cy+(i-(ls.length-1)/2)*20+5} textAnchor="middle" fontSize="12" fill="#555" fontFamily="Comic Sans MS" fontStyle="italic">{l}<\/text>)}<circle cx={cx-bw/2+10} cy={cy+bh/2+8} r="5" fill="white" stroke="#AAA" strokeWidth="1.5"/><\/g>);}
    return(<g style={{animation:"bubbleFade .22s ease-out"}}><rect x={bx} y={by} width={bw} height={bh} rx="12" fill="white" stroke="#000" strokeWidth="3"/>{ls.map((l,i)=><text key={i} x={cx} y={by+14+i*20+(bh-ls.length*20)/2} textAnchor="middle" fontSize="13" fill="#000" fontFamily="Comic Sans MS" fontWeight="bold">{l}<\/text>)}<\/g>);
}
function SFXText({text}){return <text x="270" y="72" textAnchor="middle" fontSize="26" fill="#CC0000" fontFamily="Comic Sans MS" fontWeight="bold" stroke="white" strokeWidth="5" paintOrder="stroke" style={{animation:"popIn .18s ease-out"}}>{text}<\/text>;}
function Viewer(){
  const [charModes,setCharModes]=useState(()=>{const m={};Object.entries(CHARS).forEach(([id,ch])=>{m[id]=ch.initial_mode||"idle";});return m;});
  const [charStates,setCharStates]=useState(()=>{const s={};Object.entries(CHARS).forEach(([id,ch])=>{s[id]=ch.initial_state||null;});return s;});
  const [charParams,setCharParams]=useState({});
  const [charVis,setCharVis]=useState({});
  const [charZOrder,setCharZOrder]=useState([]);
  const [bub,setBub]=useState(null);const [gas,setGas]=useState(false);
  const [sfx,setSFX]=useState(null);const [play,setPlay]=useState(false);const [ph,setPh]=useState("idle");
  const cr=useRef(false),au=useRef({});
  useEffect(()=>{const u={};Object.entries(AU).forEach(([id,b64])=>{const x=b2u(b64);if(x)u[id]=x;});au.current=u;return()=>Object.values(u).forEach(x=>URL.revokeObjectURL(x));},[]);
  function reset(){
    cr.current=true;if(window.speechSynthesis)window.speechSynthesis.cancel();
    const m={},s={};Object.entries(CHARS).forEach(([id,ch])=>{m[id]=ch.initial_mode||"idle";s[id]=ch.initial_state||null;});
    setCharModes(m);setCharStates(s);setBub(null);setGas(false);setSFX(null);setPlay(false);setPh("idle");setCharVis({});setCharZOrder([]);
  }
  async function playSkit(){
    if(play)return;cr.current=false;setPlay(true);setPh("playing");
    const ok=()=>!cr.current;
    for (const beat of LN){
      if(!ok())break;
      if(beat.pre_delay){await wt(beat.pre_delay);if(!ok())break;}
      for(const eff of (beat.effects_before||[])){if(!ok())break;if(eff==="gas_on")setGas(true);else if(eff.startsWith("sfx:"))setSFX(eff.slice(4));else if(eff==="sound:fart")fa();else if(eff==="sound:bark")bk();else if(eff==="sound:thump")th();}
      if(beat.char&&beat.mode){
        setCharModes(m=>({...m,[beat.char]:beat.mode}));
        setCharVis(v=>({...v,[beat.char]:true}));
        setCharZOrder(z=>beat.params?.bring_to_front?[...z.filter(id=>id!==beat.char),beat.char]:z.includes(beat.char)?z:[...z,beat.char]);
      }
      if(beat.char&&beat.params!==undefined)setCharParams(p=>({...p,[beat.char]:{...(p[beat.char]||{}),...(beat.params||{})}}));
      if(beat.char&&beat.char_state!==undefined)setCharStates(s=>({...s,[beat.char]:beat.char_state}));
      if(beat.sfx_text)setSFX(beat.sfx_text);
      for(const[i,s]of(beat.sounds||[]).entries()){const t=i*0.3;if(s==="bark")bk(t);else if(s==="thump")th(t);else if(s==="fart")fa(t);}
      if(beat.bubble&&beat.text){
        const bp=BPOS[beat.char]||{cx:270,cy:160,tailDir:"down-left"};
        if(ok())setBub({who:beat.char,text:beat.text,type:beat.bubble,cx:bp.cx,cy:bp.cy,tailDir:bp.tailDir});
        if(au.current[beat.id])await pa(au.current[beat.id]);
        else if(beat.tts)await sf(beat.text,beat.tts);
        else if(beat.duration)await wt(beat.duration);
      }else if(beat.duration){await wt(beat.duration);}
      if(!ok())break;
      setBub(null);setSFX(null);
      if(beat.char&&beat.mode&&beat.recordable)setCharModes(m=>({...m,[beat.char]:CHARS[beat.char]?.initial_mode||"idle"}));
      for(const eff of (beat.effects_after||[])){if(!ok())break;if(eff==="gas_off")setGas(false);}
      if(beat.post_delay){await wt(beat.post_delay);if(!ok())break;}
    }
    if(ok()){setPlay(false);setPh("done");}
  }
  const S={fontFamily:"'Comic Sans MS',cursive"};
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"radial-gradient(ellipse at top,#1a2838,#0d1520)",padding:16,...S}}>
    <div style={{fontSize:18,fontWeight:"bold",color:"#FFE900",textShadow:"3px 3px 0 #8B0000",marginBottom:2}}>🎭 FYEOX Skit Studio<\/div>
    <div style={{fontSize:11,color:"#8ABACC",fontStyle:"italic",marginBottom:10}}>{D.title}<\/div>
    <div style={{border:"3px solid #FFE900",borderRadius:12,boxShadow:"6px 6px 0 #000",overflow:"hidden"}}>
      <svg width="540" height="320" viewBox="0 0 540 320" style={{display:"block",maxWidth:"100%"}}>
        {_bgComp&&React.createElement(_bgComp)}
        {ph!=="idle"&&charZOrder.map(id=>{const Comp=charComps[id];return Comp&&charVis[id]?<Comp key={id} mode={charModes[id]} state={charStates[id]} params={charParams[id]||{}}\/>:null;})}
        {bub&&(()=>{const p=BPOS[bub.who]||CHARS[bub.who]?.bpos||{cx:270,cy:160,tailDir:"down-left"};return <Bubble cx={p.cx} cy={p.cy} text={bub.text} type={bub.type} tailDir={p.tailDir}\/>;})()}
        {sfx&&<SFXText text={sfx}\/>}
        {ph==="idle"&&(<g style={{animation:"bubbleFade .4s ease-out"}}><rect x="120" y="138" width="300" height="44" rx="10" fill="rgba(0,0,0,.85)" stroke="#FFE900" strokeWidth="2"/><text x="270" y="165" textAnchor="middle" fontSize="14" fill="#FFE900" fontFamily="Comic Sans MS" fontWeight="bold">&#9654; Hit Play to watch!<\/text><\/g>)}
        {ph==="done"&&(<g style={{animation:"bubbleFade .4s ease-out"}}><rect x="155" y="134" width="230" height="52" rx="12" fill="rgba(0,0,0,.85)" stroke="#FFE900" strokeWidth="2.5"/><text x="270" y="158" textAnchor="middle" fontSize="17" fill="#FFE900" fontFamily="Comic Sans MS" fontWeight="bold">&#127916; THE END &#127916;<\/text><text x="270" y="178" textAnchor="middle" fontSize="11" fill="#8ABACC" fontFamily="Comic Sans MS">Bobby will return...<\/text><\/g>)}
      <\/svg>
      <div style={{display:"flex",gap:10,padding:"12px 16px",background:"#0D1218",justifyContent:"center"}}>
        <button onClick={playSkit} disabled={play} style={{padding:"11px 36px",fontSize:18,...S,fontWeight:"bold",background:play?"#222":"#C0392B",color:play?"#555":"white",border:"3px solid #FFE900",borderRadius:10,cursor:play?"not-allowed":"pointer",boxShadow:"4px 4px 0 #000"}}>{play?"▶ Playing...":"▶ Play Skit"}<\/button>
        <button onClick={reset} style={{padding:"11px 20px",fontSize:16,...S,fontWeight:"bold",background:"#1A2838",color:"white",border:"3px solid #FFE900",borderRadius:10,cursor:"pointer",boxShadow:"4px 4px 0 #000"}}>&#8635; Reset<\/button>
      <\/div>
    <\/div>
    <div style={{marginTop:8,fontSize:11,textAlign:"center"}}><span style={{color:"#FFE900",fontWeight:"bold"}}>v${STUDIO_VERSION}<\/span><a href="https://github.com/unixabg/FYEOXSkits/" target="_blank" rel="noreferrer" style={{color:"#FFE900",textDecoration:"none",marginLeft:3}} title="Project page on GitHub">↗<\/a><span style={{color:"#8ABACC"}}> &nbsp;&bull;&nbsp; FYEOX Skit Studio &nbsp;&bull;&nbsp; fyeox.com &nbsp;&bull;&nbsp; AGPL-3.0<\/span><\/div>
  <\/div>);
}
const r=ReactDOM.createRoot(document.getElementById('r'));r.render(<Viewer\/>);
<\/script><\/body><\/html>`;
}

root.render(<App/>);
